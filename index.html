        <div class="brand-copy">
          <h1 class="h3 mb-1">第三会議室</h1>
        </div>
      </div>
      <div class="text-end">
        <div id="clock" class="big-time">--:--</div>
        <div id="today" class="text-secondary"></div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card mb-3">
          <div class="card-body">
            <h2 class="h5 mb-3">今すぐ予約</h2>
            <div id="status" class="alert alert-info">空き状況を確認しています...</div>
            <form id="quickForm" onsubmit="reserveNow(event)">
              <div class="mb-3">
                <label class="form-label" for="startTime">開始時刻</label>
                <select class="form-select form-select-lg" id="startTime" required onchange="loadDurationsForSelectedStart()"></select>
               
              </div>
              <div class="mb-3">
                <label class="form-label" for="durationMinutes">使用時間</label>
                <select class="form-select form-select-lg" id="durationMinutes" required></select>
                <div class="form-text">重複する組合せは表示されません。</div>
              </div>
              <button class="btn btn-primary w-100 btn-reserve" id="reserveBtn" type="submit">この内容で予約</button>
            </form>
            <a class="btn btn-outline-primary w-100 mt-2" href="https://script.google.com/macros/s/AKfycbw2PzrRXlF48zCI2LuiyTEc9QGuJeBOSmG56awWgd5Smm7n5qx0CYjaf6K_gm51FoZ0/exec" target="_top" rel="noopener">他の会議室を予約する</a>
            <button class="btn btn-outline-secondary w-100 mt-2" onclick="loadOptions()">空き状況を更新</button>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card">
          <div class="card-body">
            <h2 class="h5 mb-3">カレンダー</h2>
       <iframe
  id="calendarFrame"
  data-base-src="https://calendar.google.com/calendar/embed?src=99d08bc66ff7f63982da0b9234c2cd93da58e7f5bc8fef5dd87ed19e6e4b3734%40group.calendar.google.com&ctz=Asia%2FTokyo"
  src="https://calendar.google.com/calendar/embed?src=99d08bc66ff7f63982da0b9234c2cd93da58e7f5bc8fef5dd87ed19e6e4b3734%40group.calendar.google.com&ctz=Asia%2FTokyo"
  style="border: 0"
  width="800"
  height="600"
  frameborder="0"
  scrolling="no">
</iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  // GASをWebアプリとしてデプロイ後、「ウェブアプリURL」を貼り付けてください。
  const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbw2PzrRXlF48zCI2LuiyTEc9QGuJeBOSmG56awWgd5Smm7n5qx0CYjaf6K_gm51FoZ0/exec';

  // GASのSettingsシートのGAS_API_KEYと同じ値にしてください。
  const API_KEY = '8169';

  // SettingsシートのQUICK_RESOURCE_IDと合わせてください。
  const RESOURCE_ID = 'room-3';

  let latestOptions = null;

  document.addEventListener('DOMContentLoaded', () => {
    tickClock();
    setInterval(tickClock, 10000);
    loadOptions();
    setInterval(loadOptions, 60000);
  });

  function tickClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('today').textContent = now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  }

  function jsonp(params) {
    return new Promise((resolve, reject) => {
      if (!GAS_ENDPOINT || GAS_ENDPOINT.includes('ここに')) {
        reject(new Error('GAS_ENDPOINTが未設定です。HTML内の設定を書き換えてください。'));
        return;
      }
      const callbackName = 'gasCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
      params.callback = callbackName;
      params.apiKey = API_KEY;
      params.resourceId = RESOURCE_ID;
      const url = GAS_ENDPOINT + (GAS_ENDPOINT.includes('?') ? '&' : '?') + new URLSearchParams(params).toString();
      const script = document.createElement('script');
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error('GAS APIの応答がタイムアウトしました。'));
      }, 30000);
      function cleanup() {
        clearTimeout(timer);
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }
      window[callbackName] = data => {
        cleanup();
        if (data && data.ok === false) reject(new Error(data.message || 'APIエラーです。'));
        else resolve(data);
      };
      script.onerror = () => { cleanup(); reject(new Error('GAS APIを読み込めませんでした。URL、公開設定、APIキーを確認してください。')); };
      script.src = url;
      document.body.appendChild(script);
    });
  }

  async function loadOptions() {
    setStatus('info', '空き状況を確認しています...');
    setBusy(true);
    try {
      const data = await jsonp({ api: 'quickOptions' });
      latestOptions = data;
      renderStartOptions(data.starts || [], data.defaultStartTime || '');
      renderDurations(data.durations || []);
      if (!data.starts || !data.starts.length) {
        setStatus('warning', '本日予約できる空き時間がありません。');
      } else {
        setStatus('success', data.dateLabel + ' の予約可能時間を表示しています。');
      }
    } catch (err) {
      setStatus('danger', err.message || String(err));
      renderStartOptions([], '');
      renderDurations([]);
    } finally {
      setBusy(false);
    }
  }

  function renderStartOptions(starts, defaultStart) {
    const select = document.getElementById('startTime');
    select.innerHTML = '';
    if (!starts.length) {
      select.appendChild(new Option('選択不可', ''));
      return;
    }
    starts.forEach(t => select.appendChild(new Option(t, t)));
    if (defaultStart && starts.includes(defaultStart)) select.value = defaultStart;
  }

  async function loadDurationsForSelectedStart() {
    const startTime = document.getElementById('startTime').value;
    if (!startTime) {
      renderDurations([]);
      return;
    }
    setBusy(true);
    setStatus('info', '使用時間の候補を確認しています...');
    try {
      const data = await jsonp({ api: 'quickDurations', startTime: startTime });
      renderDurations(data.durations || []);
      if (!data.durations || !data.durations.length) setStatus('warning', 'この開始時刻で予約できる使用時間がありません。');
      else setStatus('success', '選択した開始時刻で予約可能な使用時間を表示しています。');
    } catch (err) {
      setStatus('danger', err.message || String(err));
      renderDurations([]);
    } finally {
      setBusy(false);
    }
  }

  function renderDurations(durations) {
    const select = document.getElementById('durationMinutes');
    select.innerHTML = '';
    if (!durations.length) {
      select.appendChild(new Option('選択不可', ''));
      return;
    }
    durations.forEach(d => select.appendChild(new Option(d.label + '（終了 ' + d.endTime + '）', d.value)));
    select.value = durations[0].value;
  }

  async function reserveNow(event) {
    event.preventDefault();
    const startTime = document.getElementById('startTime').value;
    const durationMinutes = document.getElementById('durationMinutes').value;
    if (!startTime || !durationMinutes) return;

    setBusy(true);
    setStatus('info', '予約を登録しています...');
    try {
      const data = await jsonp({
        api: 'quickReserve',
        startTime: startTime,
        durationMinutes: durationMinutes
      });
      setStatus('success', data.message + '<br>' + data.reservation.resourceName + ' / ' + data.reservation.dateLabel + ' ' + data.reservation.startTime + '-' + data.reservation.endTime);
      await loadOptions();
      refreshCalendar();
      setTimeout(refreshCalendar, 3000);
    } catch (err) {
      setStatus('danger', err.message || String(err));
      await loadOptions();
    } finally {
      setBusy(false);
    }
  }

  function refreshCalendar() {
    const frame = document.getElementById('calendarFrame');
    if (!frame) return;
    const baseSrc = frame.dataset.baseSrc || frame.src;
    const separator = baseSrc.includes('?') ? '&' : '?';
    frame.src = baseSrc + separator + 'refresh=' + Date.now();
  }

  function setStatus(type, html) {
    const el = document.getElementById('status');
    el.className = 'alert alert-' + type;
    el.innerHTML = html;
  }

  function setBusy(flag) {
    document.getElementById('reserveBtn').disabled = !!flag;
  }
</script>
</body>
</html>
